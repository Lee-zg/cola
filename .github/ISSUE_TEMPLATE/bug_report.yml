name: Bug report
description: Report a reproducible problem.
title: 'fix: '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List exact steps to reproduce.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0 or commit hash
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Go version, Node version, Wails version
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      render: text
