name: Feature request
description: Suggest an improvement.
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and Security Notes
      description: Does this touch imports, exports, local Web access, backups, or bookmark data?
