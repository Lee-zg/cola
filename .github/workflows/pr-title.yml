name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title
            const pattern = /^(feat|fix|docs|test|refactor|perf|build|ci|chore|security)(\([a-z0-9-]+\))?: .+/
            if (!pattern.test(title)) {
              core.setFailed(`PR title must follow Conventional Commits, for example: "feat(importer): add Safari support". Got: "${title}"`)
            }
